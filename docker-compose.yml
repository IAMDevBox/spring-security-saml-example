version: '3.8'

services:
  # Keycloak acts as SAML Identity Provider for local development
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/demo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Spring Boot SAML SP application
  saml-sp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8443:8443"
    environment:
      SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_KEYCLOAK_ASSERTINGPARTY_METADATA-URI: >
        http://keycloak:8080/realms/demo/protocol/saml/descriptor
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./src/main/resources/keystore.p12:/app/resources/keystore.p12:ro
