<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SAML SSO Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        .card { background: #f5f5f5; border-radius: 8px; padding: 20px; margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 8px 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .logout-btn {
            background: #dc3545; color: white; border: none; padding: 8px 16px;
            border-radius: 4px; cursor: pointer; float: right;
        }
    </style>
</head>
<body>
    <h1>
        Dashboard
        <form method="post" action="/logout" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn">Sign Out</button>
        </form>
    </h1>

    <div class="card">
        <h2>Authenticated User</h2>
        <table>
            <tr><th>Username</th><td th:text="${username}"></td></tr>
            <tr><th>Email</th><td th:text="${email ?: 'not provided'}"></td></tr>
            <tr><th>Given Name</th><td th:text="${givenName ?: 'not provided'}"></td></tr>
            <tr><th>IdP Registration</th><td th:text="${relyingPartyId}"></td></tr>
        </table>
    </div>

    <div class="card">
        <h2>Granted Roles</h2>
        <ul>
            <li th:each="role : ${roles}" th:text="${role}"></li>
        </ul>
    </div>

    <div class="card">
        <h2>All SAML Attributes (debug)</h2>
        <table>
            <tr th:each="entry : ${allAttributes}">
                <th th:text="${entry.key}"></th>
                <td th:text="${entry.value}"></td>
            </tr>
        </table>
    </div>
</body>
</html>
